    .status-badge{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:12px;font-size:14px;font-weight:500;margin-bottom:12px;width:100%}

<div id="qr-dummy" style="display:none"></div>
<input type="file" id="cameraInput" accept="image/*" style="display:none">
<div id="toast" class="toast"></div>
<div id="loading" class="loading-overlay">

    <div class="spinner"></div>
    <div id="loading-text" class="loading-text">処理中...</div>
    <div class="progress-bar-wrap" id="loading-bar-wrap" style="display:none">
      <div class="progress-bar-fill" id="loading-bar" style="width:0%"></div>
    </div>
  </div>
</div>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const S = {
  screen: 'home',
  batch: null,
  camMode: null,
  scanDetected: false,
  pendingFile: null,   // File object from camera for current shot
  settings: { gasUrl: '', sheetName: 'シート1' }
};

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
var DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzTRDl8v8t9FcSZsXmmF5ehzKslqwIxa41oVECR5LxDHGnJVERNnFLJR2fFSMAbxb-UJQ/exec';

function loadSettings() {
  S.settings.gasUrl = localStorage.getItem('gasUrl') || DEFAULT_GAS_URL;
  S.settings.sheetName = localStorage.getItem('sheetName') || 'シート1';
}
function saveSettingsData() {
  S.settings.gasUrl = (document.getElementById('gasUrlInput')?.value||'').trim();
  localStorage.setItem('gasUrl', S.settings.gasUrl);
  toast('設定を保存しました ✓'); go('home');
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function go(screen) {
  S.screen = screen;
  document.getElementById('app').innerHTML = buildScreen(screen);
  window.scrollTo({top:0,behavior:'instant'});
}
function buildScreen(s) {
  switch(s){
    case 'home':     return screenHome();
    case 'settings': return screenSettings();
    case 'products': return screenProducts();
    case 'sagawa':   return screenSagawa();
    case 'summary':  return screenSummary();
    case 'success':  return screenSuccess();
    default: return screenHome();
  }
}

// ══════════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════════
function screenHome() {
  const ok = !!S.settings.gasUrl;
  return `
  <div class="nav">
    <div style="min-width:60px"></div>
    <div class="nav-title">伝票スキャナー</div>
    <button class="nav-btn icon right" onclick="go('settings')">⚙️</button>
  </div>
  <div class="screen">
    <div class="large-title">伝票スキャナー</div>
    <div class="subtitle">商品ラベルと佐川伝票を撮影して<br>Drive保存 ＋ スプシに自動記録</div>
    <div class="status-badge ${ok?'status-ok':'status-warn'}">
      ${ok ? '✅ スプレッドシート接続済み' : '⚠️ 設定から Apps Script URL を入力してください'}
    </div>
    <button class="btn btn-primary" onclick="startBatch()">📦 新しいバッチを開始</button>
  </div>`;
}

function screenSettings() {
  const gasCode = `// ════════════════════════════════════════════════
// 伝票スキャナー — Google Apps Script
// ════════════════════════════════════════════════
// スプレッドシートID（URLの /d/XXXXX/edit の部分）
var SHEET_ID    = '1EaXbCgIR42ggOCAGCHo9sSsfbwWlZ8wPij4Pq6PEZRY';
var FOLDER_NAME = '伝票スキャナー画像';
var HEADER_ROW  = 4;   // 「注文番号」などのヘッダーがある行
var ORDER_COL   = 1;   // A列: 注文番号
var TRACK_COL   = 6;   // F列: 佐川急便 追跡番号
var RATE_COL    = 7;   // G列: 送料
var DATE_COL    = 8;   // H列: 発送日
// 検索対象シート（全マーケット）
var SHEETS = ['SG発送履歴','MY発送履歴','PH発送履歴','TW発送履歴','VN発送履歴','TH発送履歴'];

function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var res = data.action === 'uploadImage' ? uploadImage(data)
            : data.action === 'saveBatch'   ? saveBatch(data)
            : data.action === 'deleteFile'  ? deleteFile(data)
            : { status:'error', msg:'unknown action' };
    return ContentService
      .createTextOutput(JSON.stringify(res))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({ status:'error', msg:err.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

// ─── 画像をDriveに保存 → OCRで文字抽出 ──────
function uploadImage(data) {
  var folder = getOrCreateFolder(FOLDER_NAME);
  var filename;
  if (data.type === 'sagawa') {
    var dateStr = data.date || Utilities.formatDate(new Date(), 'Asia/Tokyo', 'M/d');
    filename = '佐川　' + dateStr + '.jpg';
  } else {
    filename = 'product_tmp_' + new Date().getTime() + '.jpg';
  }
  var b64 = data.image.replace(/^data:image\\/[^;]+;base64,/, '');
  var blob = Utilities.newBlob(Utilities.base64Decode(b64), 'image/jpeg', filename);
  var file = folder.createFile(blob);
  file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
  var fileUrl = 'https://drive.google.com/file/d/' + file.getId() + '/view';

  var result = { status:'ok', fileUrl:fileUrl };
  try {
    var lang = (data.type === 'product') ? 'en' : 'ja';
    var ocrText = runOcr(file, lang);
    result.ocrText = ocrText || '(empty)';
    if (data.type === 'sagawa') {
      result.tracking = extractTracking(ocrText);
      result.amount   = extractAmount(ocrText);
    } else {
      result.orderId = extractOrderId(ocrText);
      if (result.orderId) {
        file.setName(result.orderId + '.jpg');
      }
    }
  } catch(e) { result.ocrError = e.toString(); }
  return result;
}

// ─── Order IDで行を検索して書き込み ──────────
var HAWB_COL = 2; // B列: HAWB番号

function saveBatch(data) {
  var ss = SpreadsheetApp.openById(SHEET_ID);
  var n = data.products.length;
  var perItem = n > 0 ? Math.round(parseFloat(data.amount) / n) : 0;
  var tracking = formatTracking(data.tracking);
  var results = [];

  data.products.forEach(function(p) {
    var found = false;
    for (var si = 0; si < SHEETS.length; si++) {
      var sheet = ss.getSheetByName(SHEETS[si]);
      if (!sheet) continue;

      var imgCol = findOrCreateColumn(sheet, HEADER_ROW, '画像');
      var lastRow = sheet.getLastRow();
      if (lastRow < HEADER_ROW + 1) continue;

      // A列とB列を同時取得
      var colAB = sheet.getRange(1, ORDER_COL, lastRow, 2).getValues();

      // マッチする行を全部収集
      var matchedRows = [];
      for (var ri = 0; ri < colAB.length; ri++) {
        if (String(colAB[ri][0]).trim() === String(p.orderId).trim()) {
          matchedRows.push({ rowNum: ri + 1, hawb: String(colAB[ri][1]).trim() });
        }
      }

      if (matchedRows.length === 0) continue;

      // 重複がある場合はHAWB番号が入っている行を優先、なければ最初の行
      var targetRow = matchedRows[0];
      if (matchedRows.length > 1) {
        var withHawb = matchedRows.filter(function(r) { return r.hawb !== ''; });
        if (withHawb.length > 0) targetRow = withHawb[0];
      }

      var rowNum = targetRow.rowNum;
      sheet.getRange(rowNum, TRACK_COL).setValue(tracking);
      sheet.getRange(rowNum, RATE_COL).setValue(perItem);
      sheet.getRange(rowNum, DATE_COL).setValue(data.date);
      if (p.imageUrl) {
        sheet.getRange(rowNum, imgCol).setFormula(
          '=HYPERLINK("' + p.imageUrl + '","📷 画像")'
        );
      }
      found = true;
      results.push({ orderId:p.orderId, sheet:SHEETS[si], row:rowNum, hawb:targetRow.hawb, status:'updated' });
      break;
    }
    if (!found) results.push({ orderId:p.orderId, status:'not_found' });
  });

  return { status:'ok', count:n, perItem:perItem, results:results };
}

// ─── OCR ────────────────────────────────────
function runOcr(file, lang) {
  var resource = { title:'ocr_tmp_'+Date.now(), mimeType:'application/vnd.google-apps.document' };
  var copy = Drive.Files.copy(resource, file.getId(), { ocr:true, ocrLanguage:lang });
  var text = DocumentApp.openById(copy.id).getBody().getText();
  Drive.Files.remove(copy.id);
  return text;
}

// ─── テキスト抽出 ────────────────────────────
function extractOrderId(text) {
  // ① "Order ID:" or "Mã đơn hàng:" の後の値
  var m = text.match(/[Oo]rder\s*[Ii][Dd][^A-Z0-9]*([A-Z0-9]{8,20})/);
  if (m) return m[1];
  m = text.match(/[Mm][aã][^:]*:[\\s]*([A-Z0-9]{10,20})/);
  if (m) return m[1];
  // ② 国コード（MY/SG/PH/TW/VN/TH）＋数字のパターン
  m = text.match(/\\b((?:MY|SG|PH|TW|VN|TH)\\d{10,15})\\b/);
  if (m) return m[1];
  // ③ 数字6桁＋英数字6〜12桁のパターン
  m = text.match(/\\b(\\d{6}[A-Z0-9]{6,12})\\b/);
  return m ? m[1] : '';
}
function extractTracking(text) {
  // 優先①: 「お問い合わせ状No」の近くにある番号
  var m = text.match(/お問い合わせ[状]?[Nn][Oo]?[.．:：\s]*(\d[\d\-\s]{10,15}\d)/);
  if (m) return m[1].replace(/[\-\s]/g,'');
  // 優先②: XXXX-XXXX-XXXX 形式（12桁）
  m = text.match(/\b(\d{4}[-\s]\d{4}[-\s]\d{4})\b/);
  if (m) return m[1].replace(/[\-\s]/g,'');
  // フォールバック: 12桁の数字
  m = text.match(/\b(\d{12})\b/);
  return m ? m[1] : '';
}
function extractAmount(text) {
  var m = text.match(/[¥￥]?[\\s]*(\\d{1,3}(?:[,，]\\d{3})+)/);
  return m ? m[1].replace(/[,，]/g,'') : '';
}

// ─── 追跡番号を XXXX-XXXX-XXXX 形式に ───────
function updateSagawaBtn() {
  const btn = document.getElementById('sagawaNextBtn');
  if (!btn) return;
  const ok = S.batch.tracking.length > 0 && S.batch.amount.length > 0;
  btn.className = 'btn ' + (ok ? 'btn-primary' : 'btn-disabled');
  btn.onclick = ok ? () => go('summary') : null;
}

function formatTracking(raw) {
  var d = String(raw||'').replace(/\\D/g,'');
  return d.length === 12
    ? d.slice(0,4)+'-'+d.slice(4,8)+'-'+d.slice(8,12)
    : (raw||'');
}

// ─── ヘッダー列を探すか追加する ──────────────
function findOrCreateColumn(sheet, headerRow, name) {
  var last = sheet.getLastColumn();
  if (last > 0) {
    var headers = sheet.getRange(headerRow, 1, 1, last).getValues()[0];
    var idx = headers.indexOf(name);
    if (idx >= 0) return idx + 1;
  }
  var newCol = last + 1;
  sheet.getRange(headerRow, newCol).setValue(name).setFontWeight('bold');
  return newCol;
}

// ─── Drive ファイル削除 ───────────────────────
function deleteFile(data) {
  try {
    if (data.fileId) DriveApp.getFileById(data.fileId).setTrashed(true);
    return { status:'ok' };
  } catch(e) { return { status:'error', msg:e.toString() }; }
}

// ─── Drive フォルダ ──────────────────────────
function getOrCreateFolder(name) {
  var f = DriveApp.getFoldersByName(name);
  return f.hasNext() ? f.next() : DriveApp.createFolder(name);
}`;

  return `
  <div class="nav">
    <button class="nav-btn" onclick="go('home')">‹ 戻る</button>
    <div class="nav-title">設定</div>
    <button class="nav-btn right" onclick="saveSettingsData()" style="font-weight:700">保存</button>
  </div>
  <div class="screen">
    <div class="section">
      <div class="section-header">Apps Script URL</div>
      <div class="card" style="padding:16px">
        <div class="field" style="margin:0">
          <div class="field-label">Google Apps Script デプロイ URL</div>
          <input class="field-input" id="gasUrlInput" type="url" inputmode="url"
            placeholder="https://script.google.com/macros/s/..."
            value="${esc(S.settings.gasUrl)}" autocomplete="off" autocorrect="off">
        </div>
      </div>
    </div>
    <div class="section">
      <div class="card" style="padding:12px 16px;background:#E8F8ED">
        <div style="font-size:13px;color:#1B5E20;line-height:1.6">
          ✅ スプシ ID・シート名は GAS コード内に設定済みです。<br>
          検索対象：SG / MY / PH / TW / VN / TH 発送履歴（全自動）
        </div>
      </div>
    </div>

// ─── Sagawa ───────────────────────────────────
async function processSagawa(file) {
  // 1) ローカルでバーコードスキャン
  showLoading('バーコードを読み取り中...');
  let localTracking = '';
  try {
    const scanner = new Html5Qrcode('qr-dummy');
    const raw = await scanner.scanFile(file, false);
    // XXXX-XXXX-XXXX 形式または12桁
    const m = raw.match(/\b(\d{4}[-\s]?\d{4}[-\s]?\d{4})\b/);
    if (m) localTracking = m[1].replace(/[\-\s]/g,'');
  } catch(_) {}
  hideLoading();

  if (S.settings.gasUrl) {
    const b64raw = await fileToB64(file, 1200, 0.7);
    const b64 = b64raw.replace(/^data:image\/[^;]+;base64,/, '');

    // 2) 画像をDriveにアップロード → OCR（追跡番号・サイズ）も取得
    try {
      showLoading('画像をアップロード・読み取り中...');
      const upRes = await callGAS({ action:'uploadImage', type:'sagawa', image: b64, imageB64: b64, date: todayStr() });
      hideLoading();
      if (upRes && upRes.fileUrl) S.batch.sagawaImgUrl = upRes.fileUrl;
      let sagawaOcrText = '';
      if (upRes && upRes.ocrText) sagawaOcrText = upRes.ocrText;
      if (upRes && upRes.tracking && !localTracking) localTracking = upRes.tracking;
      // サイズから送料を自動計算
      const SAGAWA_RATES = { 60:550, 80:600, 100:690, 140:870, 160:1170 };
      const sm = sagawaOcrText.match(/\b(60|80|100|140|160)\b/);
      if (sm) {
        const size = parseInt(sm[1]);
        const rate = SAGAWA_RATES[size];
        if (rate) {
          S.batch.amount = String(rate);
          S.batch.detectedSize = size;
          S.batch.amountDetected = true;
        }
      }
    } catch(_) { hideLoading(); }
  }

  if (localTracking) { S.batch.tracking = localTracking; S.scanDetected = true; }
  go('sagawa');
  if (S.batch.tracking) toast('追跡番号を検出しました ✓');
  if (S.batch.amount) toast('金額を検出しました ✓');
  if (!S.batch.tracking) toast('手動で追跡番号を入力してください');
}

// ─── Product ──────────────────────────────────
async function processProduct(file, previewUrl) {
  showLoading('QR コードを読み取り中...');
  let detectedId = '';

  try {
    const scanner = new Html5Qrcode('qr-dummy');
    const raw = await scanner.scanFile(file, false);
    hideLoading();
    const qr = raw.trim();
    // 国コード＋数字パターン（MY/SG/PH/TW/VN/TH + 10〜15桁）
    let qm = qr.match(/\b((?:MY|SG|PH|TW|VN|TH)\d{10,15})\b/);
    if (qm) { detectedId = qm[1]; }
    // "Order ID:" の後
    if (!detectedId) { qm = qr.match(/[Oo]rder[\s_]*[Ii][Dd][^A-Z0-9]*([A-Z0-9]{8,20})/); if (qm) detectedId = qm[1]; }
    // 英数字12〜20文字（SPXXXは除外）
    if (!detectedId && !/^SPX[A-Z]{2}\d+/i.test(qr)) {
      qm = qr.match(/\b([A-Z0-9]{12,20})\b/); if (qm) detectedId = qm[1];
      if (!detectedId && qr.length < 30) detectedId = qr;
    }
  } catch(_) { hideLoading(); }

  // 2) GASにアップロード → OCRでOrder ID取得
  let imgUrl = '';
  let ocrDebugText = '';
  if (!S.settings.gasUrl) {
    ocrDebugText = 'エラー: GAS URL未設定';
  } else {
    showLoading('画像をアップロード・読み取り中...');
    try {
      const b64raw = await fileToB64(file, 1200, 0.7);
      const b64 = b64raw.replace(/^data:image\/[^;]+;base64,/, '');
      const res = await callGAS({ action:'uploadImage', type:'product', image:b64, imageB64:b64 });
      hideLoading();
      if (res && res.fileUrl) imgUrl = res.fileUrl;
      if (res && res.orderId && !detectedId) {
        detectedId = res.orderId;
        if (detectedId) toast('Order IDを自動検出しました ✓');
      }
      if (res && res.ocrError) ocrDebugText = 'OCRエラー: ' + res.ocrError;
      else if (res && res.status === 'error') ocrDebugText = 'GASエラー: ' + (res.msg||'不明');
      else if (!res) ocrDebugText = 'レスポンスなし';
      else if (res && res.ocrText) ocrDebugText = res.ocrText.slice(0, 300);
      else ocrDebugText = 'GAS応答: ' + JSON.stringify(res).slice(0, 150);
    } catch(e) {
      hideLoading();
      ocrDebugText = 'エラー: ' + e.message;
    }
  }

  showProductModal(detectedId, previewUrl, file, imgUrl, ocrDebugText);
}

<button class="modal-btn-add" onclick="confirmProduct()">追加する</button>

// ══════════════════════════════════════════════
//  SUBMIT — 画像アップロード → スプシ保存
// ══════════════════════════════════════════════
async function submitAll() {
  if (!S.settings.gasUrl) { toast('Apps Script URL が未設定です'); return; }

  const n = S.batch.products.length;
  showLoadingWithBar('画像をアップロード中... 0/' + n, 0);

  // 1) 商品画像を順番にアップロード
  for (let i = 0; i < n; i++) {
    const p = S.batch.products[i];
    if (p.imgFile && !p.imgUrl) {
      try {
        const b64 = await fileToB64(p.imgFile, 1000, 0.65);
        const res = await callGAS({ action:'uploadImage', type:'product', image:b64 });
        if (res.fileUrl) p.imgUrl = res.fileUrl;
        // OCRでOrder IDが取れてたら上書き（より精度が高い可能性）
        if (res.orderId && res.orderId.length > 5 && !p.orderId) p.orderId = res.orderId;
      } catch(_) {}
    }
    setLoadingBar(`画像をアップロード中... ${i+1}/${n}`, (i+1)/n * 80);
  }

  // 2) 佐川伝票画像（まだUpload済みでなければ）
  if (S.batch.sagawaFile && !S.batch.sagawaImgUrl) {
    setLoadingBar('佐川伝票を保存中...', 85);
    try {
      const b64 = await fileToB64(S.batch.sagawaFile, 1200, 0.7);
      const res = await callGAS({ action:'uploadImage', type:'sagawa', image:b64, imageB64:b64, date: todayStr() });
      if (res.fileUrl) S.batch.sagawaImgUrl = res.fileUrl;
    } catch(_) {}
  }

  // 3) スプシに一括書き込み
  setLoadingBar('スプレッドシートに保存中...', 90);
  try {
    const rows = S.batch.products.map(p => ({
      orderId: p.orderId, imageUrl: p.imgUrl || ''
    }));
    await callGAS({
      action: 'saveBatch',
      date: S.batch.date,
      tracking: S.batch.tracking,
      amount: S.batch.amount,
      sagawaImgUrl: S.batch.sagawaImgUrl || '',
      products: rows
    });
    hideLoading();
    go('success');
  } catch(err) {
    hideLoading();
    toast('エラー: ' + err.message);
  }
}

async function callGAS(payload) {
  const res = await fetch(S.settings.gasUrl, {
    method: 'POST',

    body: JSON.stringify(payload)
  });
  return res.json();
}

// ══════════════════════════════════════════════
//  CSV コピー（バックアップ用）
// ══════════════════════════════════════════════
function copyGasCode() {
  const pre = document.querySelector('pre');
  if (!pre) { toast('コードが見つかりません'); return; }
  const text = pre.textContent;
  navigator.clipboard?.writeText(text)
    .then(() => toast('GASコードをコピーしました ✓'))
    .catch(() => {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      toast('GASコードをコピーしました ✓');
    });
}

function copyCSV() {
  const n = S.batch.products.length;
  const total = parseFloat(S.batch.amount)||0;
  const perItem = n > 0 ? Math.round(total/n) : 0;
  const lines = ['発送日,佐川追跡番号,Order ID,1個あたり金額'];
  S.batch.products.forEach(p => lines.push(`${S.batch.date},${S.batch.tracking},${p.orderId},${perItem}`));
  const csv = lines.join('\n');
  const copy = t => navigator.clipboard?.writeText(t) || (()=>{ const el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);return Promise.resolve(); })();
  copy(csv).then(()=>toast('CSV をコピーしました ✓')).catch(()=>toast('コピーできませんでした'));
}

// ══════════════════════════════════════════════
//  IMAGE HELPERS
// ══════════════════════════════════════════════
function fileToB64(file, maxPx, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const ratio = Math.min(maxPx/img.width, maxPx/img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function showLoading(txt) {
  document.getElementById('loading-text').textContent = txt||'処理中...';
  document.getElementById('loading-bar-wrap').style.display = 'none';
  document.getElementById('loading').classList.add('show');
}
function showLoadingWithBar(txt, pct) {
  document.getElementById('loading-text').textContent = txt;
  document.getElementById('loading-bar-wrap').style.display = 'block';
  document.getElementById('loading-bar').style.width = pct+'%';
  document.getElementById('loading').classList.add('show');
}
function setLoadingBar(txt, pct) {
  document.getElementById('loading-text').textContent = txt;
  document.getElementById('loading-bar').style.width = pct+'%';
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function toast(msg, dur=2600) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), dur);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
loadSettings();
go('home');
</script>
